<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Basic SEO -->
    <title>The Secret Life of Fishies - Your Pocket Aquarium</title>
    <meta name="description" content="Build your dream aquarium! Feed fish, watch them grow, and tilt your phone to peek from above. Earn coins, unlock new species, and keep your tank thriving.">
    <link rel="canonical" href="https://thesecretlifeoffishies.com">
    <meta name="theme-color" content="#4a9eff">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thesecretlifeoffishies.com">
    <meta property="og:locale" content="en_US">
    <meta property="og:title" content="The Secret Life of Fishies - Your Pocket Aquarium">
    <meta property="og:description" content="Build your dream aquarium! Feed fish, watch them grow, and tilt your phone to peek from above. Earn coins, unlock new species, and keep your tank thriving.">
    <meta property="og:image" content="https://thesecretlifeoffishies.com/social-card.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="The Secret Life of Fishies — colorful fish swimming in a dark aquarium">
    <meta property="og:site_name" content="Zeveck">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Secret Life of Fishies - Your Pocket Aquarium">
    <meta name="twitter:description" content="Build your dream aquarium! Feed fish, watch them grow, and tilt your phone to peek from above. Earn coins, unlock new species, and keep your tank thriving.">
    <meta name="twitter:image" content="https://thesecretlifeoffishies.com/social-card.jpg">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["VideoGame", "WebApplication"],
      "name": "The Secret Life of Fishies",
      "description": "Build your dream aquarium! Feed fish, watch them grow, and tilt your phone to peek from above. Earn coins, unlock new species, and keep your tank thriving.",
      "url": "https://thesecretlifeoffishies.com",
      "image": "https://thesecretlifeoffishies.com/social-card.jpg",
      "browserRequirements": "Requires JavaScript",
      "genre": ["Simulation", "Casual"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "Game",
      "operatingSystem": "Any",
      "playMode": "SinglePlayer",
      "inLanguage": "en",
      "author": {
        "@type": "Organization",
        "name": "Zeveck"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="tank"></canvas>

    <!-- Start overlay for iOS orientation permission -->
    <div id="start-overlay">
        <div class="start-content">
            <h1>The Secret Life of Fishies</h1>
            <p>Tilt your phone to change views!</p>
            <button id="start-btn">Tap to Start</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="hud-top-right">
            <button id="menu-btn" aria-label="Menu">&#9776;</button>
        </div>
        <div id="hud-bottom">
            <div id="coin-row">
                <span id="coin-count" title="Coins">&#9679; 0</span>
                <div id="coin-bar-container">
                    <div id="coin-bar"></div>
                </div>
            </div>
            <div id="xp-row">
                <span id="pellet-count" title="Food pellets">&#8226; 5</span>
                <div id="xp-bar-container">
                    <div id="xp-bar"></div>
                </div>
                <div id="xp-label">Lv 1</div>
            </div>
        </div>
    </div>

    <!-- Drawer -->
    <div id="drawer-overlay" class="hidden"></div>
    <div id="drawer" class="hidden">
        <div id="drawer-tabs">
            <button class="tab active" data-tab="tank">Tank</button>
            <button class="tab" data-tab="store">Store</button>
            <button class="tab" data-tab="fish">My Fish</button>
        </div>
        <div id="drawer-content">
            <div id="tab-tank" class="tab-panel active">
                <h3>Water Chemistry</h3>
                <div class="stat-row"><label>Ammonia</label><div class="bar-bg"><div class="bar ammonia-bar"></div></div><span class="stat-val ammonia-val">0</span></div>
                <div class="stat-row"><label>Nitrite</label><div class="bar-bg"><div class="bar nitrite-bar"></div></div><span class="stat-val nitrite-val">0</span></div>
                <div class="stat-row"><label>Nitrate</label><div class="bar-bg"><div class="bar nitrate-bar"></div></div><span class="stat-val nitrate-val">0</span></div>
                <div class="stat-row"><label>Bacteria</label><div class="bar-bg"><div class="bar bacteria-bar"></div></div><span class="stat-val bacteria-val">0</span></div>
                <div class="stat-row"><label>Algae</label><div class="bar-bg"><div class="bar algae-bar"></div></div><span class="stat-val algae-val">0</span></div>
                <div class="tank-actions">
                    <button id="btn-water-change">Change Water (+10 XP, +5 coins)</button>
                    <label class="toggle-row">
                        <span>Free Feed Mode</span>
                        <input type="checkbox" id="toggle-free-feed">
                    </label>
                </div>
            </div>
            <div id="tab-store" class="tab-panel">
                <h3>Fish Store</h3>
                <div id="store-capacity"></div>
                <div id="store-list"></div>
            </div>
            <div id="tab-fish" class="tab-panel">
                <h3>My Fish</h3>
                <div id="fish-list"></div>
            </div>
        </div>
        <div id="drawer-footer">
            <button id="btn-share">Share My Tank</button>
            <div class="data-buttons">
                <button id="btn-export-save">Save</button>
                <button id="btn-import-save">Load</button>
                <button id="btn-reset" class="danger-btn">Reset</button>
            </div>
            <input type="file" id="import-file" accept=".json" hidden>
        </div>
    </div>

    <!-- Confirm dialog -->
    <div id="confirm-overlay" class="hidden">
        <div id="confirm-dialog">
            <canvas id="confirm-fish" width="200" height="80"></canvas>
            <p id="confirm-message"></p>
            <div class="confirm-buttons">
                <button id="confirm-cancel">Cancel</button>
                <button id="confirm-ok" class="danger-btn">Reset</button>
            </div>
        </div>
    </div>

    <!-- Fish stats popup -->
    <div id="fish-stats-popup">
        <div class="stats-name"></div>
        <div class="stats-body"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
